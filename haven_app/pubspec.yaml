name: haven_app
description: "Haven — Encrypted communication, reimagined."
publish_to: 'none'
version: 5.0.1+14

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP client
  dio: ^5.8.0

  # WebSocket
  web_socket_channel: ^3.0.2

  # Secure storage (OS keychain)
  flutter_secure_storage: ^9.2.4

  # AES-256-GCM encryption
  pointycastle: ^3.9.1

  # File picker
  file_picker: ^8.1.7

  # Platform directories
  path_provider: ^2.1.5

  # UUID generation
  uuid: ^4.5.1

  # Intl for date formatting
  intl: ^0.20.2

  # FFI for native file client
  ffi: ^2.1.3

  # SQLite for desktop — persists transfer state across restarts
  sqflite_common_ffi: ^2.3.4+4
  sqflite_common: ^2.5.4+5
  package_info_plus: ^9.0.0

  # WebRTC for video/screen share
  flutter_webrtc: ^0.12.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
